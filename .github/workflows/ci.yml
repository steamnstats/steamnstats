name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  actions: read
  issues: write
  pull-requests: write

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: steamnstats
          POSTGRES_PASSWORD: steamnstats
          POSTGRES_DB: steamnstats_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U steamnstats -d steamnstats_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        run: cd backend && pip install uv && uv sync --extra dev --frozen
      - name: Lint backend
        run: cd backend && uv run ruff check app tests && uv run mypy app
      - name: Code complexity (radon)
        run: cd backend && mkdir -p reports && uv run radon cc app -a -nb --xml > reports/radon-cc.xml && uv run radon mi app --min B > reports/radon-mi.txt
      - name: Upload radon report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: radon-report
          path: backend/reports/radon-*
          if-no-files-found: warn
      - name: Test backend
        run: cd backend && mkdir -p reports && uv run pytest --junitxml=reports/backend-tests.xml
        env:
          DATABASE_URL: postgresql+psycopg://steamnstats:steamnstats@localhost:5432/steamnstats_test
          STEAM_WEB_API_KEY: test-key
          JWT_SECRET_KEY: test-secret
          JWT_REFRESH_SECRET_KEY: test-refresh-secret
      - name: Upload backend test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: backend/reports/backend-tests.xml
          if-no-files-found: warn

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend
        run: cd frontend && npm ci
      - name: Lint frontend
        run: cd frontend && npm run lint
      - name: Test frontend
        run: cd frontend && mkdir -p reports && npm test -- --run --reporter=junit --outputFile=reports/frontend-tests.xml
      - name: Upload frontend test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-report
          path: frontend/reports/frontend-tests.xml
          if-no-files-found: warn
      - name: Build frontend
        run: cd frontend && npm run build

  test-report:
    name: Publish test report
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Download test reports
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: "*-test-report"
          path: test-reports
          merge-multiple: true

      - name: Publish PR test report comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const marker = '<!-- steamnstats-test-report -->';
            const reportsDir = 'test-reports';

            function attr(text, name) {
              const match = text.match(new RegExp(`${name}="([^"]*)"`));
              return match ? match[1] : '0';
            }

            function escapeCell(value) {
              return String(value).replaceAll('|', '\\|').replaceAll('\n', '<br>');
            }

            const files = fs.existsSync(reportsDir)
              ? fs.readdirSync(reportsDir).filter((file) => file.endsWith('.xml'))
              : [];

            const suites = files.map((file) => {
              const xml = fs.readFileSync(path.join(reportsDir, file), 'utf8');
              const suitesMatch = xml.match(/<testsuites\b[^>]*>/);
              const suiteMatch = xml.match(/<testsuite\b[^>]*>/);
              const root = suitesMatch?.[0] ?? suiteMatch?.[0] ?? '';
              const tests = Number(attr(root, 'tests'));
              const failures = Number(attr(root, 'failures'));
              const errors = Number(attr(root, 'errors'));
              const skipped = Number(attr(root, 'skipped'));
              const time = Number(attr(root, 'time'));
              const passed = Math.max(tests - failures - errors - skipped, 0);
              const name = file.replace(/-tests\.xml$/, '').replaceAll('-', ' ');
              return { name, tests, passed, failures, errors, skipped, time };
            });

            const totals = suites.reduce(
              (sum, suite) => ({
                tests: sum.tests + suite.tests,
                passed: sum.passed + suite.passed,
                failures: sum.failures + suite.failures,
                errors: sum.errors + suite.errors,
                skipped: sum.skipped + suite.skipped,
                time: sum.time + suite.time,
              }),
              { tests: 0, passed: 0, failures: 0, errors: 0, skipped: 0, time: 0 },
            );

            const status = suites.length
              ? (totals.failures || totals.errors ? 'failed' : 'passed')
              : 'no reports found';
            const rows = suites.length
              ? suites.map((suite) => (
                  `| ${escapeCell(suite.name)} | ${suite.tests} | ${suite.passed} | ${suite.failures} | ${suite.errors} | ${suite.skipped} | ${suite.time.toFixed(2)}s |`
                ))
              : ['| No test reports found | 0 | 0 | 0 | 0 | 0 | 0.00s |'];

            const body = [
              marker,
              '## Test Report',
              '',
              `**Status:** ${status}`,
              '',
              '| Suite | Tests | Passed | Failed | Errors | Skipped | Time |',
              '| --- | ---: | ---: | ---: | ---: | ---: | ---: |',
              rows.join('\n'),
              `| **Total** | **${totals.tests}** | **${totals.passed}** | **${totals.failures}** | **${totals.errors}** | **${totals.skipped}** | **${totals.time.toFixed(2)}s** |`,
              '',
              `[View workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  radon-report:
    name: Publish radon report
    runs-on: ubuntu-latest
    needs: [backend]
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Download radon report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: radon-report
          path: radon-reports

      - name: Publish PR radon report comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const marker = '<!-- steamnstats-radon-report -->';
            const reportsDir = 'radon-reports';

            const ccFile = path.join(reportsDir, 'radon-cc.xml');
            const miFile = path.join(reportsDir, 'radon-mi.txt');

            // Parse cyclomatic complexity XML
            let ccBlocks = [];
            let avgComplexity = null;

            if (fs.existsSync(ccFile)) {
              const xml = fs.readFileSync(ccFile, 'utf8');

              const avgMatch = xml.match(/<average[^>]*>([\d.]+)<\/average>/);
              if (avgMatch) avgComplexity = avgMatch[1];

              const moduleRegex = /<module\s+name="([^"]*)"[^>]*>([\s\S]*?)<\/module>/g;
              let moduleMatch;
              while ((moduleMatch = moduleRegex.exec(xml)) !== null) {
                const moduleFile = moduleMatch[1];
                const moduleContent = moduleMatch[2];

                const blockRegex = /<(function|class)\s+([^>]+)\s*\/?>/g;
                let blockMatch;
                while ((blockMatch = blockRegex.exec(moduleContent)) !== null) {
                  const tag = blockMatch[1];
                  const attrs = blockMatch[2];
                  const name = attrs.match(/name="([^"]*)"/)?.[1] ?? '???';
                  const lineno = attrs.match(/lineno="([^"]*)"/)?.[1] ?? '?';
                  const complexity = attrs.match(/complexity="([^"]*)"/)?.[1] ?? '?';
                  const rank = attrs.match(/rank="([^"]*)"/)?.[1] ?? '?';
                  ccBlocks.push({ type: tag, file: moduleFile, name, lineno, complexity, rank });
                }
              }
            }

            // Parse maintainability index text
            let miResults = [];
            if (fs.existsSync(miFile)) {
              const text = fs.readFileSync(miFile, 'utf8');
              for (const line of text.trim().split('\n')) {
                if (!line) continue;
                const match = line.match(/^(.+?)\s+-\s+([A-F])/);
                if (match) {
                  miResults.push({ file: match[1], rank: match[2] });
                }
              }
            }

            const ccRows = ccBlocks.length
              ? ccBlocks.map((b) => `| ${b.type} | \`${b.file}\` | \`${b.name}\` | ${b.lineno} | ${b.complexity} | ${b.rank} |`)
              : ['| No blocks with grade B or worse | | | | | |'];

            const miRows = miResults.length
              ? miResults.map((r) => `| \`${r.file}\` | ${r.rank} |`)
              : ['| All files grade A | |'];

            const body = [
              marker,
              '## Code Complexity Report (Radon)',
              '',
              ...(avgComplexity ? [`**Average complexity:** ${avgComplexity}`, ''] : []),
              '### Cyclomatic Complexity (grade B or worse)',
              '',
              '| Type | File | Name | Line | Complexity | Rank |',
              '| --- | --- | --- | ---: | ---: | ---: |',
              ccRows.join('\n'),
              '',
              '### Maintainability Index',
              '',
              '| File | Rank |',
              '| --- | ---: |',
              miRows.join('\n'),
              '',
              `[View workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
